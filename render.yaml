services:
  - type: web
    name: sensitive-data-compliance-assistant
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: AI_TEMPERATURE
        value: "0.1"
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GROQ_MODEL
        value: qwen/qwen3-32b
      - key: SPACY_MODEL
        value: en_core_web_sm
      - key: LANGSMITH_TRACING
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
